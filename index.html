<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Shorts 자동 업로더</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
        .container{background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.3);padding:40px;max-width:600px;width:100%;}
        .icon{font-size:64px;margin-bottom:20px;text-align:center;}
        h1{color:#333;margin-bottom:10px;font-size:28px;text-align:center;}
        .subtitle{color:#666;margin-bottom:30px;font-size:14px;text-align:center;}
        .section{margin-bottom:30px;padding:20px;background:#f9f9f9;border-radius:8px;}
        .section-title{font-weight:600;color:#333;margin-bottom:15px;font-size:16px;}
        .button-group{display:flex;gap:10px;flex-direction:column;}
        button{padding:12px 24px;border:none;border-radius:6px;font-size:16px;font-weight:600;cursor:pointer;transition:all .3s ease;}
        .btn-primary{background:#4285f4;color:#fff;}
        .btn-primary:hover{background:#357ae8;transform:translateY(-2px);box-shadow:0 10px 20px rgba(66,133,244,.3);}
        .btn-secondary{background:#ea4335;color:#fff;}
        .btn-secondary:hover{background:#d33425;}
        .btn-success{background:#34a853;color:#fff;}
        .btn-success:hover{background:#2d8e47;}
        .status{margin-top:20px;padding:15px;border-radius:6px;background:#f0f0f0;color:#333;font-size:13px;text-align:left;font-family:monospace;max-height:150px;overflow-y:auto;}
        .status.success{background:#c8e6c9;color:#2e7d32;}
        .status.error{background:#ffcdd2;color:#c62828;}
        .icon-check{color:#4caf50;}
        .icon-error{color:#f44336;}
        
        /* 파일 업로드 스타일 */
        .file-input-wrapper{position:relative;display:inline-block;cursor:pointer;width:100%;}
        .file-input-wrapper input[type="file"]{display:none;}
        .file-input-label{display:block;padding:20px;background:#e3f2fd;border:2px dashed #4285f4;border-radius:8px;text-align:center;color:#4285f4;font-weight:500;transition:all .3s ease;}
        .file-input-label:hover{background:#bbdefb;border-color:#357ae8;}
        .file-input-label.dragover{background:#90caf9;border-color:#357ae8;}
        
        .upload-progress{display:none;margin-top:15px;}
        .progress-bar{width:100%;height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden;}
        .progress-fill{height:100%;background:#4285f4;width:0%;transition:width .3s ease;}
        .progress-text{font-size:12px;color:#666;margin-top:8px;}
        
        .upload-history{margin-top:20px;}
        .history-item{padding:10px;background:#fff;border:1px solid #e0e0e0;border-radius:4px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
        .history-item.pending{border-left:4px solid #ff9800;}
        .history-item.completed{border-left:4px solid #4caf50;}
        .history-item.failed{border-left:4px solid #f44336;}
        .file-info{font-size:13px;color:#666;}
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🎬</div>
        <h1>YouTube Shorts</h1>
        <p class="subtitle">자동 업로드 도구</p>
        
        <!-- 인증 섹션 -->
        <div class="section">
            <div class="section-title">인증</div>
            <div class="button-group">
                <button class="btn-primary" onclick="checkStatus()">✓ 상태 확인</button>
                <button class="btn-primary" id="loginBtn" onclick="googleLogin()">🔵 Google 로그인</button>
                <button class="btn-secondary" id="logoutBtn" onclick="googleLogout()" style="display:none;">🔴 로그아웃</button>
            </div>
            <div id="status" class="status">로딩 중...</div>
        </div>
        
        <!-- 파일 업로드 섹션 -->
        <div class="section" id="uploadSection" style="display:none;">
            <div class="section-title">📁 파일 업로드</div>
            <div class="file-input-wrapper" id="fileDropZone">
                <input type="file" id="fileInput" accept="video/*" />
                <label for="fileInput" class="file-input-label">
                    클릭하여 파일 선택 또는 드래그 앤 드롭
                    <br><span style="font-size:12px;color:#999;">MP4, AVI, MOV, MKV (최대 500MB)</span>
                </label>
            </div>
            <div class="upload-progress" id="uploadProgress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">0%</div>
            </div>
            <button class="btn-success" id="uploadBtn" onclick="uploadFile()" style="margin-top:15px;display:none;">▲ 업로드</button>
        </div>
        
        <!-- 업로드 히스토리 섹션 -->
        <div class="section" id="historySection" style="display:none;">
            <div class="section-title">📋 업로드 히스토리</div>
            <div id="uploadHistory" class="upload-history"></div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log('📱 페이지 로드 완료');
            checkStatus();
            setupFileDragDrop();
            loadUploadHistory();
        });
        
        function checkStatus() {
            console.log('📊 상태 확인 시작');
            fetch('/status')
                .then(r => {
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    return r.json();
                })
                .then(d => {
                    console.log('✅ 데이터 파싱 완료:', d);
                    updateStatus(d);
                })
                .catch(e => {
                    console.error('❌ 에러 발생:', e);
                    showError('서버에 연결할 수 없습니다: ' + e.message);
                });
        }
        
        function updateStatus(data) {
            const s = document.getElementById('status');
            const lo = document.getElementById('logoutBtn');
            const li = document.getElementById('loginBtn');
            const us = document.getElementById('uploadSection');
            const hs = document.getElementById('historySection');
            const auth = data.authenticated ? '✓ 로그인됨' : '✗ 비로그인';
            
            s.innerHTML = `<span class="icon-check">✓ 서버 상태</span><br>상태: ${data.status}<br>환경: ${data.flask_env}<br>포트: ${data.port}<br>인증: ${auth}`;
            s.classList.remove('error');
            s.classList.add('success');
            
            lo.style.display = data.authenticated ? 'block' : 'none';
            li.style.display = data.authenticated ? 'none' : 'block';
            us.style.display = data.authenticated ? 'block' : 'none';
            hs.style.display = data.authenticated ? 'block' : 'none';
            
            console.log('✅ 상태 업데이트 완료');
        }
        
        function showError(msg) {
            const s = document.getElementById('status');
            s.innerHTML = `<span class="icon-error">✗ 오류</span><br>${msg}`;
            s.classList.remove('success');
            s.classList.add('error');
        }
        
        function googleLogin() {
            console.log('🔵 Google 로그인 시작');
            window.location.href = '/auth/login';
        }
        
        function googleLogout() {
            console.log('🔴 로그아웃 시작');
            fetch('/auth/logout')
                .then(r => r.json())
                .then(d => {
                    console.log('✅ 로그아웃 성공:', d);
                    checkStatus();
                })
                .catch(e => {
                    console.error('❌ 로그아웃 에러:', e);
                    showError('로그아웃 실패: ' + e.message);
                });
        }
        
        function setupFileDragDrop() {
            const dropZone = document.getElementById('fileDropZone');
            const fileInput = document.getElementById('fileInput');
            const uploadBtn = document.getElementById('uploadBtn');
            
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                document.querySelector('.file-input-label').classList.add('dragover');
            });
            
            dropZone.addEventListener('dragleave', () => {
                document.querySelector('.file-input-label').classList.remove('dragover');
            });
            
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                document.querySelector('.file-input-label').classList.remove('dragover');
                fileInput.files = e.dataTransfer.files;
                uploadBtn.style.display = fileInput.files.length > 0 ? 'block' : 'none';
            });
            
            fileInput.addEventListener('change', () => {
                uploadBtn.style.display = fileInput.files.length > 0 ? 'block' : 'none';
            });
        }
        
        function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files.length) {
                alert('파일을 선택하세요.');
                return;
            }
            
            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);
            
            console.log('📤 파일 업로드 시작:', file.name, file.size);
            
            const progressDiv = document.getElementById('uploadProgress');
            progressDiv.style.display = 'block';
            
            fetch('/upload/', {
                method: 'POST',
                body: formData
            })
                .then(r => r.json())
                .then(d => {
                    console.log('✅ 업로드 성공:', d);
                    progressDiv.style.display = 'none';
                    alert('파일이 성공적으로 업로드되었습니다!');
                    fileInput.value = '';
                    document.getElementById('uploadBtn').style.display = 'none';
                    loadUploadHistory();
                })
                .catch(e => {
                    console.error('❌ 업로드 실패:', e);
                    progressDiv.style.display = 'none';
                    alert('업로드 실패: ' + e.message);
                });
        }
        
        function loadUploadHistory() {
            fetch('/upload/history')
                .then(r => r.json())
                .then(d => {
                    console.log('✅ 히스토리 로드:', d);
                    if (d.status === 'success') {
                        const histDiv = document.getElementById('uploadHistory');
                        if (d.uploads.length === 0) {
                            histDiv.innerHTML = '<p style="color:#999;">업로드 기록이 없습니다.</p>';
                        } else {
                            histDiv.innerHTML = d.uploads.map(u => `
                                <div class="history-item ${u.status}">
                                    <div>
                                        <div style="font-weight:500;">${u.filename}</div>
                                        <div class="file-info">${(u.file_size / 1024 / 1024).toFixed(2)} MB • ${new Date(u.created_at).toLocaleString('ko-KR')}</div>
                                    </div>
                                    <div style="font-size:12px;padding:4px 8px;background:#f0f0f0;border-radius:4px;">${u.status}</div>
                                </div>
                            `).join('');
                        }
                    }
                })
                .catch(e => console.error('❌ 히스토리 로드 실패:', e));
        }
    </script>
</body>
</html>
